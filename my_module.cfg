#!KAMAILIO
#
# Minimal configuration for the `my_module` demo.
# Sends every incoming SIP request through both exported functions
# so you can observe header parsing in the Kamailio log.

debug=2
log_stderror=yes
listen=udp:127.0.0.1:5060

loadmodule "my_module.so"

request_route {
    # Log the Call-ID of the incoming request.
    get_sip_callid();

    # Parse the To header and log its URI components.
    get_sip_to();

    exit;
}
